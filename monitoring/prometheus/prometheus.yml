# Prometheus Configuration for PT24.PRO
# Scrape metrics from various exporters and services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'pt24-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - Server metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          instance: 'pt24-production-server'

  # MySQL Exporter - Database metrics
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql_exporter:9104']
        labels:
          instance: 'pt24-production-db'

  # Redis Exporter - Cache metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
        labels:
          instance: 'pt24-production-cache'

  # Cadvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'pt24-containers'

  # PT24 Application metrics (if custom exporter added)
  - job_name: 'pt24_app'
    static_configs:
      - targets: ['host.docker.internal:9150']
        labels:
          instance: 'pt24-wordpress'

  # Blackbox exporter - External endpoint monitoring
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://pt24.pro
          - https://pt24.pro/mechanik/
          - https://pt24.pro/mechanik/warszawa/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
