<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Logo area -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/>
  <text x="120" y="132" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">PT</text>

  <!-- Title -->
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle">PT24.PRO</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.9)" text-anchor="middle">Portal Firm i Leadów</text>

  <!-- Tagline -->
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.8)" text-anchor="middle">Znajdź sprawdzonego fachowca w kilka minut</text>

  <!-- Bottom icons row -->
  <g transform="translate(350, 470)">
    <!-- Shield -->
    <circle cx="0" cy="0" r="28" fill="rgba(255,255,255,0.15)"/>
    <path d="M0 -15 l-12 5 v8 c0 9 12 15 12 15 s12-6 12-15 v-8 z" fill="none" stroke="#fff" stroke-width="2"/>
    <!-- Star -->
    <circle cx="100" cy="0" r="28" fill="rgba(255,255,255,0.15)"/>
    <polygon points="100,-14 104,-4 114,-4 106,3 108,13 100,8 92,13 94,3 86,-4 96,-4" fill="none" stroke="#fff" stroke-width="1.5"/>
    <!-- Check -->
    <circle cx="200" cy="0" r="28" fill="rgba(255,255,255,0.15)"/>
    <polyline points="189,-2 197,6 213,-8" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Zap -->
    <circle cx="300" cy="0" r="28" fill="rgba(255,255,255,0.15)"/>
    <polygon points="300,-14 294,0 302,0 296,14 308,0 300,0 306,-14" fill="none" stroke="#fff" stroke-width="1.5"/>
    <!-- Users -->
    <circle cx="400" cy="0" r="28" fill="rgba(255,255,255,0.15)"/>
    <circle cx="395" cy="-5" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle cx="405" cy="-5" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M385 12 c0-6 5-10 10-10 s10 4 10 10" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M395 12 c0-6 5-10 10-10 s10 4 10 10" fill="none" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>
  <text x="600" y="612" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Bezpłatnie • Szybko • Bez zobowiązań • Zweryfikowani fachowcy</text>
</svg>
