<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <rect width="600" height="400" rx="16" fill="url(#hero-bg)"/>

  <!-- Person with magnifying glass (client) -->
  <circle cx="180" cy="180" r="30" fill="url(#accent)" opacity="0.9"/>
  <circle cx="180" cy="145" r="18" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
  <path d="M160 210 c0 20 10 40 20 40 s20-20 20-40" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
  <!-- Magnifying glass -->
  <circle cx="220" cy="165" r="14" fill="none" stroke="#667eea" stroke-width="3"/>
  <line x1="230" y1="176" x2="240" y2="186" stroke="#667eea" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow flow -->
  <path d="M260 190 L310 190" stroke="#764ba2" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#764ba2"/>
    </marker>
  </defs>

  <!-- Central platform card -->
  <rect x="310" y="140" width="120" height="100" rx="12" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
  <text x="370" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#764ba2" text-anchor="middle">PT24.PRO</text>
  <!-- Stars -->
  <text x="370" y="200" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">★★★★★</text>
  <!-- Checkmarks -->
  <text x="345" y="225" font-family="Arial, sans-serif" font-size="11" fill="#10b981">✓ Verified</text>

  <!-- Arrow flow to professionals -->
  <path d="M430 190 L470 165 M430 190 L470 190 M430 190 L470 215" stroke="#764ba2" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Professional icons -->
  <!-- Wrench icon -->
  <circle cx="500" cy="150" r="20" fill="#f0f0ff" stroke="#667eea" stroke-width="2"/>
  <path d="M493 143 l7 7 7-7" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <!-- Zap icon -->
  <circle cx="500" cy="200" r="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <path d="M498 192 l-3 8 h6 l-3 8" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Droplet icon -->
  <circle cx="500" cy="250" r="20" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <path d="M500 238 c-5 6 -8 10 -8 14 a8 8 0 0 0 16 0 c0-4 -3-8 -8-14" fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- Bottom text -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Klient → Zapytanie → Sprawdzeni Fachowcy</text>
  <text x="300" y="365" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Jedno zapytanie. Wiele ofert. Bezpłatnie.</text>
</svg>
