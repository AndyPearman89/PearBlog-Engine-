<svg width="980" height="220" viewBox="0 0 980 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PearBlog Wordmark</title>
  <desc id="desc">PearBlog wordmark with green-blue gradient accent.</desc>
  <defs>
    <linearGradient id="wordmarkGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>

  <text x="30" y="145" font-family="Poppins, Montserrat, Segoe UI, Arial, sans-serif" font-size="120" font-weight="800" fill="#0B1118" letter-spacing="0.5">Pear</text>
  <text x="360" y="145" font-family="Poppins, Montserrat, Segoe UI, Arial, sans-serif" font-size="120" font-weight="800" fill="url(#wordmarkGradient)" letter-spacing="0.5">Blog</text>
  <rect x="30" y="167" width="840" height="8" rx="4" fill="url(#wordmarkGradient)" opacity="0.3"/>
</svg>
