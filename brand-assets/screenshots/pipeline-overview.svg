<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a7f37;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6e40c9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="moneyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d29922;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bb8009;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="publishGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1158c7;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="700">🍐 PearBlog Engine — Autonomous Content Pipeline</text>
  <text x="450" y="66" text-anchor="middle" fill="#8b949e" font-size="13">7 steps · ~55 sec · $0.08 per article · 100% automated via WP-Cron</text>

  <!-- Step 1: Topic Queue -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="110" height="90" rx="10" fill="url(#stepGrad)"/>
    <text x="85" y="128" text-anchor="middle" fill="#fff" font-size="22">📋</text>
    <text x="85" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Topic Queue</text>
    <text x="85" y="168" text-anchor="middle" fill="#adf5b5" font-size="9">Step 1</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="145" x2="162" y2="145" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: PromptBuilder -->
  <g filter="url(#shadow)">
    <rect x="162" y="100" width="110" height="90" rx="10" fill="url(#stepGrad)"/>
    <text x="217" y="128" text-anchor="middle" fill="#fff" font-size="22">🔧</text>
    <text x="217" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">PromptBuilder</text>
    <text x="217" y="168" text-anchor="middle" fill="#adf5b5" font-size="9">Step 2 · Factory</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="272" y1="145" x2="294" y2="145" stroke="#30363d" stroke-width="2"/>

  <!-- Step 3: GPT-4o-mini -->
  <g filter="url(#shadow)">
    <rect x="294" y="100" width="110" height="90" rx="10" fill="url(#aiGrad)"/>
    <text x="349" y="128" text-anchor="middle" fill="#fff" font-size="22">🤖</text>
    <text x="349" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">GPT-4o-mini</text>
    <text x="349" y="168" text-anchor="middle" fill="#d2a8ff" font-size="9">Step 3 · AI Content</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="404" y1="145" x2="426" y2="145" stroke="#30363d" stroke-width="2"/>

  <!-- Step 4: SEO Engine -->
  <g filter="url(#shadow)">
    <rect x="426" y="100" width="110" height="90" rx="10" fill="url(#stepGrad)"/>
    <text x="481" y="128" text-anchor="middle" fill="#fff" font-size="22">🔍</text>
    <text x="481" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">SEO Engine</text>
    <text x="481" y="168" text-anchor="middle" fill="#adf5b5" font-size="9">Step 4 · Schema.org</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="536" y1="145" x2="558" y2="145" stroke="#30363d" stroke-width="2"/>

  <!-- Step 5: Monetization -->
  <g filter="url(#shadow)">
    <rect x="558" y="100" width="110" height="90" rx="10" fill="url(#moneyGrad)"/>
    <text x="613" y="128" text-anchor="middle" fill="#fff" font-size="22">💰</text>
    <text x="613" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Monetization</text>
    <text x="613" y="168" text-anchor="middle" fill="#ffd33d" font-size="9">Step 5 · Ads + SaaS</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="668" y1="145" x2="690" y2="145" stroke="#30363d" stroke-width="2"/>

  <!-- Step 6: DALL-E 3 -->
  <g filter="url(#shadow)">
    <rect x="690" y="100" width="110" height="90" rx="10" fill="url(#aiGrad)"/>
    <text x="745" y="128" text-anchor="middle" fill="#fff" font-size="22">🎨</text>
    <text x="745" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">DALL-E 3</text>
    <text x="745" y="168" text-anchor="middle" fill="#d2a8ff" font-size="9">Step 6 · Image</text>
  </g>

  <!-- Arrow 6→7 (curves down) -->
  <path d="M 800 145 Q 850 145 850 240 Q 850 280 800 280" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Step 7: Publish -->
  <g filter="url(#shadow)">
    <rect x="690" y="230" width="110" height="90" rx="10" fill="url(#publishGrad)"/>
    <text x="745" y="258" text-anchor="middle" fill="#fff" font-size="22">🚀</text>
    <text x="745" y="280" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Publish</text>
    <text x="745" y="298" text-anchor="middle" fill="#a5d6ff" font-size="9">Step 7 · WordPress</text>
  </g>

  <!-- Bottom panels -->

  <!-- Modules panel -->
  <g filter="url(#shadow)">
    <rect x="30" y="240" width="310" height="250" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="185" y="268" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="700">📦 Core Modules</text>

    <text x="50" y="295" fill="#7ee787" font-size="11">ContentPipeline</text>
    <text x="210" y="295" fill="#8b949e" font-size="10">7-step orchestrator</text>

    <text x="50" y="318" fill="#7ee787" font-size="11">AIClient</text>
    <text x="210" y="318" fill="#8b949e" font-size="10">GPT-4o-mini integration</text>

    <text x="50" y="341" fill="#7ee787" font-size="11">SEOEngine</text>
    <text x="210" y="341" fill="#8b949e" font-size="10">Meta + Schema.org</text>

    <text x="50" y="364" fill="#7ee787" font-size="11">MonetizationEngine</text>
    <text x="210" y="364" fill="#8b949e" font-size="10">AdSense + SaaS CTA</text>

    <text x="50" y="387" fill="#7ee787" font-size="11">CronManager</text>
    <text x="210" y="387" fill="#8b949e" font-size="10">WP-Cron + multisite</text>

    <text x="50" y="410" fill="#7ee787" font-size="11">PromptBuilderFactory</text>
    <text x="210" y="410" fill="#8b949e" font-size="10">4 specialised builders</text>

    <text x="50" y="433" fill="#7ee787" font-size="11">ImageGenerator</text>
    <text x="210" y="433" fill="#8b949e" font-size="10">DALL-E 3 featured images</text>

    <text x="50" y="456" fill="#7ee787" font-size="11">AutomationController</text>
    <text x="210" y="456" fill="#8b949e" font-size="10">REST API endpoints</text>

    <text x="50" y="479" fill="#7ee787" font-size="11">AdminPage</text>
    <text x="210" y="479" fill="#8b949e" font-size="10">WP Admin settings UI</text>
  </g>

  <!-- Theme panel -->
  <g filter="url(#shadow)">
    <rect x="360" y="240" width="200" height="250" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="460" y="268" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="700">🎨 Theme Features</text>

    <text x="380" y="296" fill="#79c0ff" font-size="11">• SEO-first layout</text>
    <text x="380" y="319" fill="#79c0ff" font-size="11">• AI personalisation</text>
    <text x="380" y="342" fill="#79c0ff" font-size="11">• A/B headline testing</text>
    <text x="380" y="365" fill="#79c0ff" font-size="11">• Auto ad injection</text>
    <text x="380" y="388" fill="#79c0ff" font-size="11">• Affiliate priority</text>
    <text x="380" y="411" fill="#79c0ff" font-size="11">• Core Web Vitals</text>
    <text x="380" y="434" fill="#79c0ff" font-size="11">• Lazy loading</text>
    <text x="380" y="457" fill="#79c0ff" font-size="11">• Multisite branding</text>
    <text x="380" y="480" fill="#79c0ff" font-size="11">• 12 template parts</text>
  </g>

  <!-- Metrics panel -->
  <g filter="url(#shadow)">
    <rect x="580" y="340" width="290" height="150" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="725" y="368" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="700">📊 Key Metrics</text>

    <text x="600" y="395" fill="#ffa657" font-size="11">Cost / article</text>
    <text x="820" y="395" fill="#f0f6fc" font-size="11" text-anchor="end">$0.08</text>

    <text x="600" y="418" fill="#ffa657" font-size="11">Pipeline time</text>
    <text x="820" y="418" fill="#f0f6fc" font-size="11" text-anchor="end">~55 sec</text>

    <text x="600" y="441" fill="#ffa657" font-size="11">Articles / month</text>
    <text x="820" y="441" fill="#f0f6fc" font-size="11" text-anchor="end">720</text>

    <text x="600" y="464" fill="#ffa657" font-size="11">Automation level</text>
    <text x="820" y="464" fill="#f0f6fc" font-size="11" text-anchor="end">100%</text>

    <text x="600" y="487" fill="#ffa657" font-size="11">Monthly cost</text>
    <text x="820" y="487" fill="#f0f6fc" font-size="11" text-anchor="end">~$58</text>
  </g>

  <!-- Separator lines in metrics -->
  <line x1="600" y1="403" x2="850" y2="403" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="426" x2="850" y2="426" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="449" x2="850" y2="449" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="472" x2="850" y2="472" stroke="#30363d" stroke-width="0.5"/>

  <!-- Version badge -->
  <rect x="750" y="500" width="120" height="16" rx="4" fill="#30363d"/>
  <text x="810" y="512" text-anchor="middle" fill="#8b949e" font-size="9">PearBlog Engine v4.3</text>
</svg>
