<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#1158c7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#1a7f37"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#6e40c9"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d29922"/>
      <stop offset="100%" style="stop-color:#bb8009"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#b62324"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#58a6ff"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" rx="14" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="700">🍐 PearBlog Engine v6.0 — System Architecture</text>
  <text x="550" y="68" text-anchor="middle" fill="#8b949e" font-size="13">WordPress MU-Plugin · PSR-4 autoloaded · 16 namespaced modules · 238 PHPUnit tests</text>

  <!-- ═══ EXTERNAL SERVICES (top) ═══ -->
  <text x="550" y="100" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">EXTERNAL SERVICES</text>
  <line x1="80" y1="108" x2="470" y2="108" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="630" y1="108" x2="1020" y2="108" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- OpenAI -->
  <g filter="url(#shadow)">
    <rect x="80" y="115" width="130" height="56" rx="8" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
    <text x="145" y="138" text-anchor="middle" fill="#d2a8ff" font-size="20">🤖</text>
    <text x="145" y="156" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="600">OpenAI</text>
    <text x="145" y="168" text-anchor="middle" fill="#8b949e" font-size="9">GPT-4o-mini · DALL-E 3</text>
  </g>

  <!-- Slack/Discord -->
  <g filter="url(#shadow)">
    <rect x="240" y="115" width="130" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="305" y="138" text-anchor="middle" fill="#79c0ff" font-size="20">📣</text>
    <text x="305" y="156" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="600">Slack / Discord</text>
    <text x="305" y="168" text-anchor="middle" fill="#8b949e" font-size="9">Webhook alerts</text>
  </g>

  <!-- ESP -->
  <g filter="url(#shadow)">
    <rect x="400" y="115" width="130" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="465" y="138" text-anchor="middle" fill="#79c0ff" font-size="20">✉️</text>
    <text x="465" y="156" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="600">ESP (Email)</text>
    <text x="465" y="168" text-anchor="middle" fill="#8b949e" font-size="9">Mailchimp · ConvertKit</text>
  </g>

  <!-- Social -->
  <g filter="url(#shadow)">
    <rect x="560" y="115" width="130" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="625" y="138" text-anchor="middle" fill="#79c0ff" font-size="20">📱</text>
    <text x="625" y="156" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="600">Social Media</text>
    <text x="625" y="168" text-anchor="middle" fill="#8b949e" font-size="9">Twitter · FB · LinkedIn</text>
  </g>

  <!-- PagerDuty -->
  <g filter="url(#shadow)">
    <rect x="720" y="115" width="130" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="785" y="138" text-anchor="middle" fill="#ffa657" font-size="20">🚨</text>
    <text x="785" y="156" text-anchor="middle" fill="#ffa657" font-size="11" font-weight="600">PagerDuty</text>
    <text x="785" y="168" text-anchor="middle" fill="#8b949e" font-size="9">P0 escalations</text>
  </g>

  <!-- GitHub Actions -->
  <g filter="url(#shadow)">
    <rect x="880" y="115" width="140" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="950" y="138" text-anchor="middle" fill="#f0f6fc" font-size="20">⚙️</text>
    <text x="950" y="156" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="600">GitHub Actions</text>
    <text x="950" y="168" text-anchor="middle" fill="#8b949e" font-size="9">CI · Automation webhook</text>
  </g>

  <!-- Connector lines from external down -->
  <line x1="145" y1="171" x2="145" y2="210" stroke="#8957e5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="305" y1="171" x2="305" y2="210" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="465" y1="171" x2="465" y2="210" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="625" y1="171" x2="625" y2="210" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="785" y1="171" x2="785" y2="210" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="950" y1="171" x2="950" y2="210" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ═══ CORE PLUGIN BOX ═══ -->
  <rect x="70" y="210" width="960" height="440" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="550" y="232" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">PearBlog Engine MU-Plugin  (mu-plugins/pearblog-engine/src/)</text>

  <!-- ── Central: ContentPipeline ── -->
  <g filter="url(#shadow)">
    <rect x="380" y="248" width="340" height="72" rx="10" fill="url(#coreGrad)"/>
    <text x="550" y="272" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">⚡ ContentPipeline</text>
    <text x="550" y="291" text-anchor="middle" fill="#a5d6ff" font-size="10">12-step orchestrator · Hourly WP-Cron · ~55 sec/article</text>
    <text x="550" y="308" text-anchor="middle" fill="#a5d6ff" font-size="9">Topic→AI→DupCheck→Draft→SEO→$→Link→Image→DupIdx→Publish→QualityScore</text>
  </g>

  <!-- Arrows from pipeline outward -->
  <line x1="380" y1="284" x2="328" y2="284" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="284" x2="772" y2="284" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="320" x2="550" y2="360" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Left column ── -->

  <!-- AIClient -->
  <g filter="url(#shadow)">
    <rect x="90" y="248" width="230" height="70" rx="8" fill="url(#purpleGrad)"/>
    <text x="205" y="272" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🤖 AI/AIClient</text>
    <text x="205" y="290" text-anchor="middle" fill="#d2a8ff" font-size="9">GPT-4o-mini · Retry · Circuit Breaker</text>
    <text x="205" y="306" text-anchor="middle" fill="#d2a8ff" font-size="9">Cost tracking · pearblog_ai_cost_cents</text>
  </g>
  <line x1="320" y1="283" x2="335" y2="283" stroke="#8957e5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ImageGenerator -->
  <g filter="url(#shadow)">
    <rect x="90" y="334" width="230" height="60" rx="8" fill="url(#purpleGrad)"/>
    <text x="205" y="358" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🎨 AI/ImageGenerator</text>
    <text x="205" y="376" text-anchor="middle" fill="#d2a8ff" font-size="9">DALL-E 3 featured images · Media library</text>
  </g>

