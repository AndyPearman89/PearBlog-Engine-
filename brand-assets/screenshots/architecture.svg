  <g filter="url(#shadow)">
    <rect x="90" y="410" width="230" height="70" rx="8" fill="url(#greenGrad)"/>
    <text x="205" y="434" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📝 Content/</text>
    <text x="205" y="452" text-anchor="middle" fill="#adf5b5" font-size="9">TopicQueue · DuplicateDetector</text>
    <text x="205" y="468" text-anchor="middle" fill="#adf5b5" font-size="9">ContentValidator · QualityScorer · RefreshEngine</text>
  </g>

  <!-- PromptBuilderFactory -->
  <g filter="url(#shadow)">
    <rect x="90" y="496" width="230" height="60" rx="8" fill="url(#greenGrad)"/>
    <text x="205" y="520" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🔧 Content/PromptBuilderFactory</text>
    <text x="205" y="538" text-anchor="middle" fill="#adf5b5" font-size="9">7 industry builders · Travel · Tech · Finance…</text>
  </g>

  <!-- Keywords + Cache -->
  <g filter="url(#shadow)">
    <rect x="90" y="572" width="230" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="205" y="596" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="700">🔑 Keywords/ · 🗄️ Cache/</text>
    <text x="205" y="614" text-anchor="middle" fill="#8b949e" font-size="9">KeywordCluster · ContentCache (transient)</text>
  </g>

  <!-- ── Right column ── -->

  <!-- Monitoring -->
  <g filter="url(#shadow)">
    <rect x="780" y="248" width="230" height="70" rx="8" fill="url(#redGrad)"/>
    <text x="895" y="272" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📊 Monitoring/</text>
    <text x="895" y="290" text-anchor="middle" fill="#ffa198" font-size="9">AlertManager · HealthController</text>
    <text x="895" y="306" text-anchor="middle" fill="#ffa198" font-size="9">PerformanceDashboard · Logger</text>
  </g>
  <line x1="765" y1="283" x2="775" y2="283" stroke="#da3633" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- API + Webhook -->
  <g filter="url(#shadow)">
    <rect x="780" y="334" width="230" height="60" rx="8" fill="url(#coreGrad)"/>
    <text x="895" y="358" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🌐 API/</text>
    <text x="895" y="376" text-anchor="middle" fill="#a5d6ff" font-size="9">AutomationController · WebhookManager · RateLimiter</text>
  </g>

  <!-- SEO -->
  <g filter="url(#shadow)">
    <rect x="780" y="410" width="230" height="70" rx="8" fill="url(#greenGrad)"/>
    <text x="895" y="434" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🔍 SEO/</text>
    <text x="895" y="452" text-anchor="middle" fill="#adf5b5" font-size="9">SEOEngine · ProgrammaticSEO · SchemaManager</text>
    <text x="895" y="468" text-anchor="middle" fill="#adf5b5" font-size="9">InternalLinker · Yoast/RankMath compat</text>
  </g>

  <!-- Admin + CLI -->
  <g filter="url(#shadow)">
    <rect x="780" y="496" width="230" height="60" rx="8" fill="url(#goldGrad)"/>
    <text x="895" y="520" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">⚙️ Admin/ · 💻 CLI/</text>
    <text x="895" y="538" text-anchor="middle" fill="#ffd33d" font-size="9">AdminPage · DashboardWidget · PearBlogCommand</text>
  </g>

  <!-- Social + Email + Scheduler -->
  <g filter="url(#shadow)">
    <rect x="780" y="572" width="230" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="895" y="596" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="700">📱 Social/ · ✉️ Email/ · ⏰ Scheduler/</text>
    <text x="895" y="614" text-anchor="middle" fill="#8b949e" font-size="9">SocialPublisher · EmailDigest · CronManager</text>
  </g>

  <!-- ── Center bottom: Monetization + Tenant ── -->
  <g filter="url(#shadow)">
    <rect x="380" y="360" width="340" height="60" rx="8" fill="url(#goldGrad)"/>
    <text x="550" y="384" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">💰 Monetization/ · 🏢 Tenant/</text>
    <text x="550" y="402" text-anchor="middle" fill="#ffd33d" font-size="9">MonetizationEngine · AdSense · Affiliate · SaaS CTA · TenantContext</text>
  </g>

  <!-- Center bottom 2: Tests -->
  <g filter="url(#shadow)">
    <rect x="380" y="440" width="340" height="56" rx="8" fill="#21262d" stroke="#7ee787" stroke-width="1.5"/>
    <text x="550" y="465" text-anchor="middle" fill="#7ee787" font-size="12" font-weight="700">🧪 tests/php/Unit/ + Integration/</text>
    <text x="550" y="483" text-anchor="middle" fill="#8b949e" font-size="9">238 tests · 489 assertions · PHPUnit · GitHub Actions CI</text>
  </g>

  <!-- Center bottom 3: Theme -->
  <g filter="url(#shadow)">
    <rect x="380" y="514" width="340" height="56" rx="8" fill="#21262d" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="550" y="539" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="700">🎨 theme/pearblog-theme/ v5.2</text>
    <text x="550" y="557" text-anchor="middle" fill="#8b949e" font-size="9">SEO-first layout · Dark mode · Reading progress · 6 templates</text>
  </g>

  <!-- Center bottom 4: Scripts + Clients -->
  <g filter="url(#shadow)">
    <rect x="380" y="588" width="340" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="550" y="610" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="700">🐍 scripts/ · JS/Python clients/ · 📦 examples/</text>
    <text x="550" y="628" text-anchor="middle" fill="#8b949e" font-size="9">automation_orchestrator.py · pearblog-client.js · Postman collection</text>
  </g>

  <!-- ═══ WORDPRESS CORE (bottom) ═══ -->
  <rect x="70" y="660" width="960" height="52" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="550" y="682" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">WordPress Core (PSR-4 Autoload · WP-Cron · REST API · MySQL · wp_options · post_meta)</text>
  <text x="550" y="700" text-anchor="middle" fill="#6e7681" font-size="10">PHP 8.1+ · WordPress 6.0+ · Required: OpenAI API key</text>

  <!-- Arrows center → wordpress -->
  <line x1="550" y1="643" x2="550" y2="655" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Version -->
  <text x="550" y="787" text-anchor="middle" fill="#6e7681" font-size="10">PearBlog Engine v6.0.2 · Architecture Diagram · 2026-04-12</text>
</svg>
