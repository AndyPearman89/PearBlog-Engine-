name: PearBlog Content Pipeline Automation

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run pipeline'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  run-content-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run content pipeline
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python scripts/run_pipeline.py

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.name "PearBlog Bot"
          git config --global user.email "bot@pearblog.dev"

          # Check if there are changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "🤖 Automated content pipeline update - Run #${{ github.run_number }}"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Content pipeline execution failed. Check logs for details."
