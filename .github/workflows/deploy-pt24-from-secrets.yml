name: Deploy PT24 With GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      run_base_deploy:
        description: "Run scripts/deploy-pt24-pro.sh before local services deploy"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  deploy-pt24:
    name: Deploy pt24.pro and configure OpenAI key
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        id: vars
        run: |
          SSH_HOST="${{ secrets.SSH_HOST || vars.SSH_HOST }}"
          SSH_USER="${{ secrets.SSH_USER || vars.SSH_USER }}"
          SSH_PORT="${{ secrets.SSH_PORT || vars.SSH_PORT }}"
          REMOTE_REPO_PATH="${{ secrets.REMOTE_REPO_PATH || vars.REMOTE_REPO_PATH || '/root/PearBlog-Engine-' }}"
          WEB_ROOT="${{ secrets.PT24_WEB_ROOT || vars.PT24_WEB_ROOT || '/var/www/pt24.pro' }}"

          HAS_KEY=false
          HAS_PASSWORD=false
          [[ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]] && HAS_KEY=true
          [[ -n "${{ secrets.SSH_PASSWORD }}" ]] && HAS_PASSWORD=true

          MISSING=()
          [[ -z "$SSH_HOST" ]] && MISSING+=("SSH_HOST (secret or variable)")
          [[ -z "$SSH_USER" ]] && MISSING+=("SSH_USER (secret or variable)")
          [[ -z "${{ secrets.OPENAI_API_KEY }}" ]] && MISSING+=("OPENAI_API_KEY (secret)")

          if [[ "$HAS_KEY" != true && "$HAS_PASSWORD" != true ]]; then
            MISSING+=("SSH_PRIVATE_KEY or SSH_PASSWORD")
          fi

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi

          AUTH_MODE="key"
          if [[ "$HAS_KEY" != true ]]; then
            AUTH_MODE="password"
          fi

          echo "ssh_host=$SSH_HOST" >> "$GITHUB_OUTPUT"
          echo "ssh_user=$SSH_USER" >> "$GITHUB_OUTPUT"
          echo "ssh_port=${SSH_PORT:-22}" >> "$GITHUB_OUTPUT"
          echo "auth_mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"
          echo "remote_repo_path=$REMOTE_REPO_PATH" >> "$GITHUB_OUTPUT"
          echo "web_root=$WEB_ROOT" >> "$GITHUB_OUTPUT"
          echo "run_base_deploy=${{ github.event.inputs.run_base_deploy || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH agent
        if: ${{ steps.vars.outputs.auth_mode == 'key' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install sshpass for password auth
        if: ${{ steps.vars.outputs.auth_mode == 'password' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ steps.vars.outputs.ssh_port }}" -H "${{ steps.vars.outputs.ssh_host }}" >> ~/.ssh/known_hosts

      - name: Prepare .env with OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          umask 177
          printf "OPENAI_API_KEY=%s\n" "$OPENAI_API_KEY" > pt24.env

      - name: Upload .env to server via key
        if: ${{ steps.vars.outputs.auth_mode == 'key' }}
        run: |
          scp -P "${{ steps.vars.outputs.ssh_port }}" pt24.env "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}:/tmp/pt24.env"

      - name: Upload .env to server via password
        if: ${{ steps.vars.outputs.auth_mode == 'password' }}
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -P "${{ steps.vars.outputs.ssh_port }}" pt24.env "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}:/tmp/pt24.env"

      - name: Deploy PT24 scripts and install .env via key
        if: ${{ steps.vars.outputs.auth_mode == 'key' }}
        run: |
          ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "set -e
            if [ ! -d '${{ steps.vars.outputs.remote_repo_path }}' ]; then
              git clone https://github.com/${{ github.repository }}.git '${{ steps.vars.outputs.remote_repo_path }}'
            else
              git -C '${{ steps.vars.outputs.remote_repo_path }}' pull --ff-only
            fi

            if [ '${{ steps.vars.outputs.run_base_deploy }}' = 'true' ]; then
              cd '${{ steps.vars.outputs.remote_repo_path }}'
              bash ./scripts/deploy-pt24-pro.sh
            fi

            install -m 600 /tmp/pt24.env '${{ steps.vars.outputs.web_root }}/.env'
            rm -f /tmp/pt24.env

            cd '${{ steps.vars.outputs.remote_repo_path }}'
            bash ./scripts/deploy-pt24-local-services.sh"

      - name: Deploy PT24 scripts and install .env via password
        if: ${{ steps.vars.outputs.auth_mode == 'password' }}
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "set -e
            if [ ! -d '${{ steps.vars.outputs.remote_repo_path }}' ]; then
              git clone https://github.com/${{ github.repository }}.git '${{ steps.vars.outputs.remote_repo_path }}'
            else
              git -C '${{ steps.vars.outputs.remote_repo_path }}' pull --ff-only
            fi

            if [ '${{ steps.vars.outputs.run_base_deploy }}' = 'true' ]; then
              cd '${{ steps.vars.outputs.remote_repo_path }}'
              bash ./scripts/deploy-pt24-pro.sh
            fi

            install -m 600 /tmp/pt24.env '${{ steps.vars.outputs.web_root }}/.env'
            rm -f /tmp/pt24.env

            cd '${{ steps.vars.outputs.remote_repo_path }}'
            bash ./scripts/deploy-pt24-local-services.sh"

      - name: Verify PT24 online via key
        if: ${{ steps.vars.outputs.auth_mode == 'key' }}
        run: |
          ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "curl -s -o /dev/null -w 'PT24 HTTP %{http_code} (%{size_download} bytes)\\n' https://pt24.pro"

      - name: Verify PT24 online via password
        if: ${{ steps.vars.outputs.auth_mode == 'password' }}
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "curl -s -o /dev/null -w 'PT24 HTTP %{http_code} (%{size_download} bytes)\\n' https://pt24.pro"

      - name: Cleanup local env artifact
        if: always()
        run: rm -f pt24.env