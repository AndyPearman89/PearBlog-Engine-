name: Check Secrets Status

on:
  workflow_dispatch:

jobs:
  check:
    name: Check available secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH_HOST
        run: |
          if [[ -n "${{ secrets.SSH_HOST }}" ]]; then
            echo "✅ SSH_HOST is available (length: ${#SECRET})"
          else
            echo "❌ SSH_HOST is NOT available"
          fi
        env:
          SECRET: ${{ secrets.SSH_HOST }}

      - name: Check SSH_USER
        run: |
          if [[ -n "${{ secrets.SSH_USER }}" ]]; then
            echo "✅ SSH_USER is available (length: ${#SECRET})"
          else
            echo "❌ SSH_USER is NOT available"
          fi
        env:
          SECRET: ${{ secrets.SSH_USER }}

      - name: Check SSH_PASSWORD
        run: |
          if [[ -n "${{ secrets.SSH_PASSWORD }}" ]]; then
            echo "✅ SSH_PASSWORD is available (length: ${#SECRET})"
          else
            echo "❌ SSH_PASSWORD is NOT available"
          fi
        env:
          SECRET: ${{ secrets.SSH_PASSWORD }}

      - name: Check SSH_PRIVATE_KEY
        run: |
          if [[ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]]; then
            echo "✅ SSH_PRIVATE_KEY is available (length: ${#SECRET})"
          else
            echo "❌ SSH_PRIVATE_KEY is NOT available"
          fi
        env:
          SECRET: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Check WP_PATH
        run: |
          if [[ -n "${{ secrets.WP_PATH }}" ]]; then
            echo "✅ WP_PATH is available (value: ${{ secrets.WP_PATH }})"
          else
            echo "❌ WP_PATH is NOT available"
          fi

      - name: Summary
        run: |
          echo "===================="
          echo "SECRETS STATUS CHECK"
          echo "===================="
          echo ""
          echo "Run this workflow to see which secrets are available."
          echo "Then add missing secrets at:"
          echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
