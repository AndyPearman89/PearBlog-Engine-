name: Deploy PT24 via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ftp-pt24:
    name: Deploy plugin & theme via FTP to PT24
    runs-on: ubuntu-latest
    env:
      CONNECT_TIMEOUT_SECONDS: "20"
      DEPLOY_TIMEOUT_MINUTES: "8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        id: preflight
        env:
          FTP_PROTOCOL_SECRET: ${{ secrets.FTP_PROTOCOL }}
        run: |
          set -euo pipefail
          MISSING=()
          [[ -z "${{ secrets.FTP_HOST }}" ]] && MISSING+=("FTP_HOST")
          [[ -z "${{ secrets.FTP_USERNAME }}" ]] && MISSING+=("FTP_USERNAME")
          [[ -z "${{ secrets.FTP_PASSWORD }}" ]] && MISSING+=("FTP_PASSWORD")
          [[ -z "${{ secrets.FTP_PORT }}" ]] && MISSING+=("FTP_PORT")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions"
            exit 1
          fi
          PROTOCOL="${FTP_PROTOCOL_SECRET:-ftp}"
          case "$PROTOCOL" in
            ftp|ftps|sftp) ;;
            *)
              echo "::error::Invalid FTP_PROTOCOL value '$PROTOCOL'. Use one of: ftp, ftps, sftp."
              exit 1
              ;;
          esac
          if [[ -n "${{ secrets.FTP_PORT }}" && ! "${{ secrets.FTP_PORT }}" =~ ^[0-9]+$ ]]; then
            echo "::error::FTP_PORT must be numeric."
            exit 1
          fi
          if [[ -n "${{ secrets.FTP_PORT }}" ]] && (( ${{ secrets.FTP_PORT }} < 1 || ${{ secrets.FTP_PORT }} > 65535 )); then
            echo "::error::FTP_PORT must be in range 1-65535."
            exit 1
          fi
          echo "Using deployment protocol: $PROTOCOL (default: ftp; set FTP_PROTOCOL secret to override)."
          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"

      - name: Install FTP diagnostics tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp netcat-openbsd

      - name: Validate deployment connectivity
        run: |
          HOST="${{ secrets.FTP_HOST }}"
          PORT="${{ secrets.FTP_PORT }}"
          echo "TCP check: $HOST:$PORT"
          nc -z -w "${{ env.CONNECT_TIMEOUT_SECONDS }}" "$HOST" "$PORT" && echo "TCP OK" || { echo "::error::Endpoint unreachable at $HOST:$PORT"; exit 1; }

      - name: Deploy via lftp (mu-plugins + themes)
        timeout-minutes: ${{ fromJSON(env.DEPLOY_TIMEOUT_MINUTES) }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PROTO: ${{ steps.preflight.outputs.protocol }}
        run: |
          set -euo pipefail
          echo "Deploying via $FTP_PROTO to $FTP_HOST:$FTP_PORT"

          # lftp settings block written to a temp file to avoid inline quoting issues
          cat > /tmp/lftp_settings.txt << 'SETTINGS'
          set net:timeout 60
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set ftp:passive-mode true
          set ftp:ssl-allow true
          set ftp:ssl-force false
          set ssl:verify-certificate false
          set sftp:connect-program "ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30"
          SETTINGS

          open_cmd="open -u '$FTP_USER','$FTP_PASS' -p '$FTP_PORT' '$FTP_PROTO://$FTP_HOST'"

          mirror_dir() {
            local src="$1" dst="$2"
            echo "  mirror: $src -> $dst"
            lftp -c "
              $(cat /tmp/lftp_settings.txt)
              $open_cmd
              mirror --reverse --delete --verbose=1 --no-perms --no-symlinks '$src' '$dst'
              bye
            " 2>&1
          }

          upload_file() {
            local f="$1" dst="$2"
            echo "  put: $f -> $dst/$(basename $f)"
            lftp -c "
              $(cat /tmp/lftp_settings.txt)
              $open_cmd
              put '$f' -o '$dst/$(basename $f)'
              bye
            " 2>&1
          }

          # 1. pearblog-engine plugin directory
          mirror_dir "./mu-plugins/pearblog-engine/" "/pt24/wp-content/mu-plugins/pearblog-engine/"

          # 2. Root PT24 mu-plugin PHP files
          REMOTE_MU="/pt24/wp-content/mu-plugins"
          for f in \
            mu-plugins/pearblog-engine-loader.php \
            mu-plugins/pt24-ai-factory.php \
            mu-plugins/pt24-ai-factory-loader.php \
            mu-plugins/pt24-blog-engine.php \
            mu-plugins/pt24-blog-engine-loader.php \
            mu-plugins/pt24-content-seed.php \
            mu-plugins/pt24-local-services.php \
            mu-plugins/pt24-places-loader.php \
            mu-plugins/pt24-places-seeder.php \
            mu-plugins/pt24-scale-data.php; do
            [ -f "$f" ] && upload_file "$f" "$REMOTE_MU"
          done

          # 3. PT24 theme
          mirror_dir "./theme/pt24/" "/pt24/wp-content/themes/pt24/"

          # 4. PearBlog theme (active theme on PT24)
          mirror_dir "./theme/pearblog-theme/" "/pt24/wp-content/themes/pearblog-theme/"

          echo "Deploy complete."
