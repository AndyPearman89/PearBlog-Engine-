name: Deploy PT24 via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ftp-pt24:
    name: Deploy plugin & theme via FTP to PT24
    runs-on: ubuntu-latest
    env:
      CONNECT_TIMEOUT_SECONDS: "20"
      DEPLOY_TIMEOUT_MINUTES: "8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          set -euo pipefail
          MISSING=()
          [[ -z "${{ secrets.FTP_HOST }}" ]] && MISSING+=("FTP_HOST")
          [[ -z "${{ secrets.FTP_USERNAME }}" ]] && MISSING+=("FTP_USERNAME")
          [[ -z "${{ secrets.FTP_PASSWORD }}" ]] && MISSING+=("FTP_PASSWORD")
          [[ -z "${{ secrets.FTP_PORT }}" ]] && MISSING+=("FTP_PORT")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All secrets present. Using SFTP protocol."

      - name: Install FTP diagnostics tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp netcat-openbsd

      - name: Validate SFTP connectivity
        run: |
          HOST="${{ secrets.FTP_HOST }}"
          PORT="${{ secrets.FTP_PORT }}"
          TIMEOUT="${CONNECT_TIMEOUT_SECONDS}"
          echo "TCP check: $HOST:$PORT"
          nc -z -w "$TIMEOUT" "$HOST" "$PORT" || { echo "::error::Endpoint unreachable"; exit 1; }
          echo "TCP OK — SFTP endpoint reachable"

      - name: Deploy all files via SFTP
        timeout-minutes: ${{ fromJSON(env.DEPLOY_TIMEOUT_MINUTES) }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail

          # Write credentials to netrc to avoid shell quoting issues
          mkdir -p ~/.ssh
          echo "machine $FTP_HOST login $FTP_USER password $FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc

          # Base lftp settings
          LFTP_SETTINGS="set net:timeout 30; set sftp:auto-confirm yes; set sftp:connect-program \"ssh -o StrictHostKeyChecking=no -p $FTP_PORT\""
          LFTP_OPEN="open sftp://$FTP_USER:$FTP_PASS@$FTP_HOST -p $FTP_PORT"

          echo "=== Deploying mu-plugins/pearblog-engine/ ==="
          lftp -e "$LFTP_SETTINGS; $LFTP_OPEN; mirror -R --verbose --delete ./mu-plugins/pearblog-engine/ /pt24/wp-content/mu-plugins/pearblog-engine/; bye"

          echo "=== Deploying root mu-plugin files ==="
          REMOTE="/pt24/wp-content/mu-plugins"
          for f in \
            mu-plugins/pearblog-engine-loader.php \
            mu-plugins/pt24-ai-factory.php \
            mu-plugins/pt24-ai-factory-loader.php \
            mu-plugins/pt24-blog-engine.php \
            mu-plugins/pt24-blog-engine-loader.php \
            mu-plugins/pt24-content-seed.php \
            mu-plugins/pt24-local-services.php \
            mu-plugins/pt24-places-loader.php \
            mu-plugins/pt24-places-seeder.php \
            mu-plugins/pt24-scale-data.php; do
            if [ -f "$f" ]; then
              echo "Uploading $f ..."
              lftp -e "$LFTP_SETTINGS; $LFTP_OPEN; put '$f' -o '$REMOTE/$(basename $f)'; bye"
            else
              echo "Skipping $f (not found)"
            fi
          done

          echo "=== Deploying theme/pt24/ ==="
          lftp -e "$LFTP_SETTINGS; $LFTP_OPEN; mirror -R --verbose --delete ./theme/pt24/ /pt24/wp-content/themes/pt24/; bye"

          echo "=== Deploying theme/pearblog-theme/ ==="
          lftp -e "$LFTP_SETTINGS; $LFTP_OPEN; mirror -R --verbose --delete ./theme/pearblog-theme/ /pt24/wp-content/themes/pearblog-theme/; bye"

          # Cleanup
          rm -f ~/.netrc
          echo "=== All deployments complete ==="
