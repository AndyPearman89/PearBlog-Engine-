name: Deploy via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without uploading)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  deploy-ftp:
    name: Deploy plugin & theme via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING=()
          [[ -z "${{ secrets.FTP_HOST }}" ]]     && MISSING+=("FTP_HOST")
          [[ -z "${{ secrets.FTP_USERNAME }}" ]] && MISSING+=("FTP_USERNAME")
          [[ -z "${{ secrets.FTP_PASSWORD }}" ]] && MISSING+=("FTP_PASSWORD")
          [[ -z "${{ secrets.FTP_SERVER_DIR }}" ]] && MISSING+=("FTP_SERVER_DIR")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions:"
            echo "  FTP_HOST        – FTP server hostname (e.g. wordpress2614653.home.pl)"
            echo "  FTP_USERNAME    – FTP account username"
            echo "  FTP_PASSWORD    – FTP account password"
            echo "  FTP_SERVER_DIR  – Remote base path (e.g. /public_html/wp-content)"
            exit 1
          fi

      - name: Deploy mu-plugin via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./mu-plugins/pearblog-engine/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/mu-plugins/pearblog-engine/
          dry-run: ${{ github.event.inputs.dry_run == 'true' }}
          log-level: standard
          dangerous-clean-slate: false

      - name: Deploy theme via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./theme/pearblog-theme/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/themes/pearblog-theme/
          dry-run: ${{ github.event.inputs.dry_run == 'true' }}
          log-level: standard
          dangerous-clean-slate: false

      - name: Deployment summary
        run: |
          echo "✅ FTP deploy complete"
          echo "   Plugin : ${{ secrets.FTP_SERVER_DIR }}/mu-plugins/pearblog-engine/"
          echo "   Theme  : ${{ secrets.FTP_SERVER_DIR }}/themes/pearblog-theme/"
          echo "   Server : ${{ secrets.FTP_HOST }}"
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "   ⚠️  Dry-run mode – no files were uploaded"
          fi
