name: Deploy via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ftp:
    name: Deploy plugin & theme via FTP
    runs-on: ubuntu-latest
    env:
      CONNECT_TIMEOUT_SECONDS: "20"
      DEPLOY_TIMEOUT_MINUTES: "8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        id: preflight
        env:
          FTP_PROTOCOL_SECRET: ${{ secrets.FTP_PROTOCOL }}
        run: |
          set -euo pipefail
          MISSING=()
          [[ -z "${{ secrets.FTP_HOST }}" ]] && MISSING+=("FTP_HOST")
          [[ -z "${{ secrets.FTP_USERNAME }}" ]] && MISSING+=("FTP_USERNAME")
          [[ -z "${{ secrets.FTP_PASSWORD }}" ]] && MISSING+=("FTP_PASSWORD")
          [[ -z "${{ secrets.FTP_PORT }}" ]] && MISSING+=("FTP_PORT")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions"
            exit 1
          fi
          PROTOCOL="${FTP_PROTOCOL_SECRET:-ftp}"
          case "$PROTOCOL" in
            ftp|ftps|sftp) ;;
            *)
              echo "::error::Invalid FTP_PROTOCOL value '$PROTOCOL'. Use one of: ftp, ftps, sftp."
              exit 1
              ;;
          esac
          # Empty/unset FTP_PROTOCOL falls back to ftp; non-empty invalid values fail above.
          if [[ -n "${{ secrets.FTP_PORT }}" && ! "${{ secrets.FTP_PORT }}" =~ ^[0-9]+$ ]]; then
            echo "::error::FTP_PORT must be numeric."
            exit 1
          fi
          if [[ -n "${{ secrets.FTP_PORT }}" ]] && (( ${{ secrets.FTP_PORT }} < 1 || ${{ secrets.FTP_PORT }} > 65535 )); then
            echo "::error::FTP_PORT must be in range 1-65535."
            exit 1
          fi
          echo "Using deployment protocol: $PROTOCOL (default: ftp; set FTP_PROTOCOL secret to override)."
          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"

      - name: Install FTP diagnostics tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp netcat-openbsd

      - name: Validate deployment connectivity
        env:
          FTP_PROTOCOL: ${{ steps.preflight.outputs.protocol }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          CONNECT_TIMEOUT="${CONNECT_TIMEOUT_SECONDS}"

          echo "Preflight connectivity check: protocol=$FTP_PROTOCOL host=$FTP_HOST port=$FTP_PORT"

          if ! nc -z -w "$CONNECT_TIMEOUT" "$FTP_HOST" "$FTP_PORT"; then
            if [[ "$FTP_PROTOCOL" == "sftp" ]]; then
              echo "::error::SSH/SFTP endpoint unreachable at $FTP_HOST:$FTP_PORT. Verify host/port, SSH availability, and any IP allowlists/firewalls."
            else
              echo "::error::FTP endpoint unreachable at $FTP_HOST:$FTP_PORT. Verify host/port, protocol, and any IP allowlists/firewalls."
            fi
            exit 1
          fi

          # Pass credentials directly via URL — avoids netrc file path/format issues.
          LFTP_OUTPUT=$(lftp -c "
            set cmd:fail-exit true
            set net:timeout ${CONNECT_TIMEOUT}
            set net:max-retries 1
            set net:reconnect-interval-base 5
            open -u \"${FTP_USERNAME}\",\"${FTP_PASSWORD}\" -p \"${FTP_PORT}\" \"${FTP_PROTOCOL}://${FTP_HOST}\"
            ls
            bye
          " 2>&1) || {
            echo "$LFTP_OUTPUT" | tail -n 50
            if [[ "$FTP_PROTOCOL" == "sftp" ]]; then
              echo "::error::SFTP authentication/listing failed after connecting to $FTP_HOST:$FTP_PORT. Verify protocol, credentials, and SSH/SFTP permissions."
            else
              echo "::error::FTP authentication/listing failed after connecting to $FTP_HOST:$FTP_PORT. Verify protocol and credentials."
            fi
            exit 1
          }

      - name: Deploy mu-plugin
        # Keep a bounded transfer window to avoid long hangs while allowing typical full syncs.
        timeout-minutes: ${{ fromJSON(env.DEPLOY_TIMEOUT_MINUTES) }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ steps.preflight.outputs.protocol }}
          log-level: verbose
          local-dir: ./mu-plugins/pearblog-engine/
          server-dir: /poradnik/wp-content/mu-plugins/pearblog-engine/
          dangerous-clean-slate: false

      - name: Deploy theme
        # Keep a bounded transfer window to avoid long hangs while allowing typical full syncs.
        timeout-minutes: ${{ fromJSON(env.DEPLOY_TIMEOUT_MINUTES) }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ steps.preflight.outputs.protocol }}
          log-level: verbose
          local-dir: ./theme/pearblog-theme/
          server-dir: /poradnik/wp-content/themes/pearblog-theme/
          dangerous-clean-slate: false
