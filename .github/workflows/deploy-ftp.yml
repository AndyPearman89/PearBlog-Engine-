name: Deploy via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without uploading)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  deploy-ftp:
    name: Deploy plugin & theme via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve FTP configuration
        id: ftpvars
        run: |
          MISSING=()
          [[ -z "${{ secrets.FTP_HOST }}" ]]     && MISSING+=("FTP_HOST")
          [[ -z "${{ secrets.FTP_USERNAME }}" ]] && MISSING+=("FTP_USERNAME")
          [[ -z "${{ secrets.FTP_PASSWORD }}" ]] && MISSING+=("FTP_PASSWORD")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions:"
            echo "  FTP_HOST       – FTP server hostname"
            echo "  FTP_USERNAME   – FTP account username"
            echo "  FTP_PASSWORD   – FTP account password"
            echo "  FTP_PORT       – (optional) FTP port; defaults to 22"
            echo "  FTP_SERVER_DIR – (optional) override base path; defaults to /poradnik/wp-content"
            exit 1
          fi
          # Default WordPress base: /poradnik/wp-content
          SERVER_DIR="${{ secrets.FTP_SERVER_DIR }}"
          SERVER_DIR="${SERVER_DIR:-/poradnik/wp-content}"
          FTP_PORT="${{ secrets.FTP_PORT }}"
          FTP_PORT="${FTP_PORT:-22}"
          echo "server_dir=$SERVER_DIR" >> "$GITHUB_OUTPUT"
          echo "ftp_port=$FTP_PORT"   >> "$GITHUB_OUTPUT"
          echo "FTP base path: $SERVER_DIR  port: $FTP_PORT"

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -T 10 -p "${{ steps.ftpvars.outputs.ftp_port }}" -H "${{ secrets.FTP_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          if [[ ! -s ~/.ssh/known_hosts ]]; then
            echo "::warning::ssh-keyscan returned no keys, adding StrictHostKeyChecking=accept-new"
            printf 'Host *\n  StrictHostKeyChecking accept-new\n' >> ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Test FTP connection
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e ssh -p "${{ steps.ftpvars.outputs.ftp_port }}" \
            -o BatchMode=no \
            -o ConnectTimeout=15 \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" \
            "echo 'FTP connection successful'"

      - name: Deploy mu-plugin via rsync over FTP
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          FLAGS="-avz --delete"
          [[ "${{ github.event.inputs.dry_run }}" == "true" ]] && FLAGS="$FLAGS --dry-run"
          sshpass -e rsync $FLAGS \
            -e "ssh -p ${{ steps.ftpvars.outputs.ftp_port }} -o BatchMode=no" \
            ./mu-plugins/pearblog-engine/ \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:${{ steps.ftpvars.outputs.server_dir }}/mu-plugins/pearblog-engine/"

      - name: Deploy theme via rsync over FTP
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          FLAGS="-avz --delete"
          [[ "${{ github.event.inputs.dry_run }}" == "true" ]] && FLAGS="$FLAGS --dry-run"
          sshpass -e rsync $FLAGS \
            -e "ssh -p ${{ steps.ftpvars.outputs.ftp_port }} -o BatchMode=no" \
            ./theme/pearblog-theme/ \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:${{ steps.ftpvars.outputs.server_dir }}/themes/pearblog-theme/"

      - name: Deployment summary
        run: |
          echo "✅ FTP deploy complete"
          echo "   Plugin : ${{ steps.ftpvars.outputs.server_dir }}/mu-plugins/pearblog-engine/"
          echo "   Theme  : ${{ steps.ftpvars.outputs.server_dir }}/themes/pearblog-theme/"
          echo "   Server : ${{ secrets.FTP_HOST }}  port: ${{ steps.ftpvars.outputs.ftp_port }}"
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "   ⚠️  Dry-run mode – no files were uploaded"
          fi
