name: Deploy via SFTP

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without uploading)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  deploy-ftp:
    name: Deploy plugin & theme via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve SFTP configuration
        id: ftpvars
        run: |
          MISSING=()
          [[ -z "${{ secrets.FTP_HOST }}" ]]     && MISSING+=("FTP_HOST")
          [[ -z "${{ secrets.FTP_USERNAME }}" ]] && MISSING+=("FTP_USERNAME")
          [[ -z "${{ secrets.FTP_PASSWORD }}" ]] && MISSING+=("FTP_PASSWORD")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions:"
            echo "  FTP_HOST       – SFTP server hostname (e.g. wordpress2614653.home.pl)"
            echo "  FTP_USERNAME   – SFTP account username"
            echo "  FTP_PASSWORD   – SFTP account password"
            echo "  FTP_PORT       – (optional) SSH/SFTP port; defaults to 22"
            echo "  FTP_SERVER_DIR – (optional) override base path; defaults to /poradnik/wp-content"
            exit 1
          fi
          # Default WordPress base: /poradnik/wp-content
          SERVER_DIR="${{ secrets.FTP_SERVER_DIR }}"
          SERVER_DIR="${SERVER_DIR:-/poradnik/wp-content}"
          SFTP_PORT="${{ secrets.FTP_PORT }}"
          SFTP_PORT="${SFTP_PORT:-22}"
          echo "server_dir=$SERVER_DIR" >> "$GITHUB_OUTPUT"
          echo "sftp_port=$SFTP_PORT"   >> "$GITHUB_OUTPUT"
          echo "SFTP base path: $SERVER_DIR  port: $SFTP_PORT"

      - name: Deploy mu-plugin via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: sftp
          server: ${{ secrets.FTP_HOST }}
          port: ${{ steps.ftpvars.outputs.sftp_port }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./mu-plugins/pearblog-engine/
          server-dir: ${{ steps.ftpvars.outputs.server_dir }}/mu-plugins/pearblog-engine/
          dry-run: ${{ github.event.inputs.dry_run == 'true' }}
          log-level: standard
          dangerous-clean-slate: false

      - name: Deploy theme via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: sftp
          server: ${{ secrets.FTP_HOST }}
          port: ${{ steps.ftpvars.outputs.sftp_port }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./theme/pearblog-theme/
          server-dir: ${{ steps.ftpvars.outputs.server_dir }}/themes/pearblog-theme/
          dry-run: ${{ github.event.inputs.dry_run == 'true' }}
          log-level: standard
          dangerous-clean-slate: false

      - name: Deployment summary
        run: |
          echo "✅ SFTP deploy complete"
          echo "   Plugin : ${{ steps.ftpvars.outputs.server_dir }}/mu-plugins/pearblog-engine/"
          echo "   Theme  : ${{ steps.ftpvars.outputs.server_dir }}/themes/pearblog-theme/"
          echo "   Server : ${{ secrets.FTP_HOST }}  port: ${{ steps.ftpvars.outputs.sftp_port }}"
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "   ⚠️  Dry-run mode – no files were uploaded"
          fi
