name: Create Release v9.0.0

on:
  push:
    branches: [main]
    paths:
      - 'RELEASE-NOTES-v9.0.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v9.0.0
          name: "PearBlog Engine v9.0.0 — Scale, Intelligence & Ecosystem Expansion"
          body_path: RELEASE-NOTES-v9.0.md
          draft: false
          prerelease: false
