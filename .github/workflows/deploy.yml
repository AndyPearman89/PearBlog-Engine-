name: Deploy to WordPress Server

on:
  push:
    branches:
      - main
    paths:
      - 'mu-plugins/**'
      - 'theme/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force full deploy (skip changed-files check)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy plugin & theme via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        id: vars
        run: |
          sanitize_input() {
            printf '%s' "$1" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          SSH_HOST="$(sanitize_input "${{ secrets.SSH_HOST || vars.SSH_HOST }}")"
          SSH_USER="$(sanitize_input "${{ secrets.SSH_USER || vars.SSH_USER }}")"
          WP_PATH="$(sanitize_input "${{ secrets.WP_PATH || vars.WP_PATH }}")"
          SSH_PORT="$(sanitize_input "${{ secrets.SSH_PORT || vars.SSH_PORT }}")"
          FORCE="${{ github.event.inputs.force_deploy }}"

          HAS_KEY=false
          HAS_PASSWORD=false
          [[ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]] && HAS_KEY=true
          [[ -n "${{ secrets.SSH_PASSWORD }}" ]] && HAS_PASSWORD=true

          MISSING=()
          [[ -z "$SSH_HOST" ]] && MISSING+=("SSH_HOST (secret or variable)")
          [[ -z "$SSH_USER" ]] && MISSING+=("SSH_USER (secret or variable)")
          [[ -z "$WP_PATH" ]]  && MISSING+=("WP_PATH (secret or variable)")

          if [[ "$HAS_KEY" != true && "$HAS_PASSWORD" != true ]]; then
            MISSING+=("SSH_PRIVATE_KEY or SSH_PASSWORD")
          fi

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Add them under Settings → Secrets and variables → Actions"
            exit 1
          fi

          AUTH_MODE="key"
          if [[ "$HAS_KEY" == true && "$HAS_PASSWORD" == true ]]; then
            AUTH_MODE="auto"
          elif [[ "$HAS_KEY" != true ]]; then
            AUTH_MODE="password"
          fi

          echo "ssh_host=$SSH_HOST" >> "$GITHUB_OUTPUT"
          echo "ssh_user=$SSH_USER" >> "$GITHUB_OUTPUT"
          echo "wp_path=$WP_PATH" >> "$GITHUB_OUTPUT"
          echo "auth_mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"
          echo "has_key=$HAS_KEY" >> "$GITHUB_OUTPUT"
          echo "has_password=$HAS_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "ssh_port=${SSH_PORT:-22}" >> "$GITHUB_OUTPUT"
          echo "force=${FORCE:-false}" >> "$GITHUB_OUTPUT"

          echo "Deploy config ready. Auth mode: $AUTH_MODE"

      - name: Set up SSH agent
        if: ${{ steps.vars.outputs.has_key == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install sshpass for password auth
        if: ${{ steps.vars.outputs.has_password == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ steps.vars.outputs.ssh_port }}" -H "${{ steps.vars.outputs.ssh_host }}" >> ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        id: auth
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          verify_key_auth() {
            ssh -o BatchMode=yes -o PreferredAuthentications=publickey \
              -p "${{ steps.vars.outputs.ssh_port }}" \
              "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
              "true" >/dev/null
          }

          verify_password_auth() {
            sshpass -p "$SSH_PASSWORD" \
              ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              -p "${{ steps.vars.outputs.ssh_port }}" \
              "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
              "true" >/dev/null
          }

          RESOLVED_AUTH_MODE=""

          if [[ "${{ steps.vars.outputs.has_key }}" == 'true' ]] && verify_key_auth; then
            RESOLVED_AUTH_MODE="key"
          elif [[ "${{ steps.vars.outputs.has_key }}" == 'true' ]]; then
            echo "::warning::SSH key authentication failed. Will try password auth if available."
          fi

          if [[ -z "$RESOLVED_AUTH_MODE" && "${{ steps.vars.outputs.has_password }}" == 'true' ]] && verify_password_auth; then
            RESOLVED_AUTH_MODE="password"
          fi

          if [[ -z "$RESOLVED_AUTH_MODE" ]]; then
            echo "::error::Unable to authenticate to ${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }} with the provided SSH credentials."
            echo "::error::If this is a DigitalOcean droplet, ensure the deploy user's public key is present in ~/.ssh/authorized_keys or remove SSH_PRIVATE_KEY so the workflow can use SSH_PASSWORD."
            exit 1
          fi

          echo "auth_mode=$RESOLVED_AUTH_MODE" >> "$GITHUB_OUTPUT"
          echo "Using SSH auth mode: $RESOLVED_AUTH_MODE"

      - name: Deploy mu-plugin (pearblog-engine) via key
        if: ${{ steps.auth.outputs.auth_mode == 'key' }}
        run: |
          RSYNC_OPTS="-avz --delete"
          # When force_deploy is false only changed paths trigger this job (push paths filter).
          # The flag is available for manual runs to confirm intent; behaviour is identical
          # since rsync always syncs the full tree — the flag documents operator intent.
          rsync $RSYNC_OPTS \
            -e "ssh -p ${{ steps.vars.outputs.ssh_port }}" \
            mu-plugins/pearblog-engine/ \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}:${{ steps.vars.outputs.wp_path }}/wp-content/mu-plugins/pearblog-engine/"

      - name: Deploy mu-plugin (pearblog-engine) via password
        if: ${{ steps.auth.outputs.auth_mode == 'password' }}
        run: |
          RSYNC_OPTS="-avz --delete"
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync $RSYNC_OPTS \
            -e "ssh -p ${{ steps.vars.outputs.ssh_port }}" \
            mu-plugins/pearblog-engine/ \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}:${{ steps.vars.outputs.wp_path }}/wp-content/mu-plugins/pearblog-engine/"

      - name: Deploy theme (pearblog-theme) via key
        if: ${{ steps.auth.outputs.auth_mode == 'key' }}
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ steps.vars.outputs.ssh_port }}" \
            theme/pearblog-theme/ \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}:${{ steps.vars.outputs.wp_path }}/wp-content/themes/pearblog-theme/"

      - name: Deploy theme (pearblog-theme) via password
        if: ${{ steps.auth.outputs.auth_mode == 'password' }}
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -p ${{ steps.vars.outputs.ssh_port }}" \
            theme/pearblog-theme/ \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}:${{ steps.vars.outputs.wp_path }}/wp-content/themes/pearblog-theme/"

      - name: Flush WordPress object cache via key
        if: ${{ steps.auth.outputs.auth_mode == 'key' }}
        continue-on-error: true
        run: |
          ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "cd '${{ steps.vars.outputs.wp_path }}' && wp cache flush --allow-root 2>/dev/null || true"

      - name: Flush WordPress object cache via password
        if: ${{ steps.auth.outputs.auth_mode == 'password' }}
        continue-on-error: true
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "cd '${{ steps.vars.outputs.wp_path }}' && wp cache flush --allow-root 2>/dev/null || true"

      - name: Enterprise V8 admin smoke test via key
        if: ${{ steps.auth.outputs.auth_mode == 'key' }}
        run: |
          ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "cd '${{ steps.vars.outputs.wp_path }}' && wp eval 'echo class_exists(\"PearBlogEngine\\\\Admin\\\\AdminPageV8Enterprise\") ? \"CLASS_OK\\n\" : \"CLASS_MISSING\\n\"; global \$menu; do_action(\"admin_menu\"); \$found=false; foreach ((array) \$menu as \$item) { if (isset(\$item[2]) && \$item[2] === \"pearblog-enterprise-v8\") { \$found=true; break; } } echo \$found ? \"MENU_OK\\n\" : \"MENU_MISSING\\n\";' --allow-root" \
            | tee smoke-output.txt

          grep -q '^CLASS_OK$' smoke-output.txt
          grep -q '^MENU_OK$' smoke-output.txt

      - name: Enterprise V8 admin smoke test via password
        if: ${{ steps.auth.outputs.auth_mode == 'password' }}
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -p "${{ steps.vars.outputs.ssh_port }}" \
            "${{ steps.vars.outputs.ssh_user }}@${{ steps.vars.outputs.ssh_host }}" \
            "cd '${{ steps.vars.outputs.wp_path }}' && wp eval 'echo class_exists(\"PearBlogEngine\\\\Admin\\\\AdminPageV8Enterprise\") ? \"CLASS_OK\\n\" : \"CLASS_MISSING\\n\"; global \$menu; do_action(\"admin_menu\"); \$found=false; foreach ((array) \$menu as \$item) { if (isset(\$item[2]) && \$item[2] === \"pearblog-enterprise-v8\") { \$found=true; break; } } echo \$found ? \"MENU_OK\\n\" : \"MENU_MISSING\\n\";' --allow-root" \
            | tee smoke-output.txt

          grep -q '^CLASS_OK$' smoke-output.txt
          grep -q '^MENU_OK$' smoke-output.txt

      - name: Deployment summary
        run: |
          echo "✅ Deploy complete"
          echo "   Plugin:  wp-content/mu-plugins/pearblog-engine/"
          echo "   Theme:   wp-content/themes/pearblog-theme/"
          echo "   Server:  ${{ steps.vars.outputs.ssh_host }}"
